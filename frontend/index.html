<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <h1>Login</h1>

        <form id="loginForm">

            <input
                type="email"
                id="loginEmail"
                placeholder="Enter your email"
                required
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Enter your password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p id="loginMessage"></p>

        <p>
            Don't have an account?
            <a href="register.html">Register</a>
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
